version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arenita_tracking
      POSTGRES_USER: arenita
      POSTGRES_PASSWORD: arenita_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tracking:
    build: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/arenita_tracking
      SPRING_DATASOURCE_USERNAME: arenita
      SPRING_DATASOURCE_PASSWORD: arenita_secret
    depends_on:
      - postgres

volumes:
  pgdata:
